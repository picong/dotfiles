# vim-tmux-navigator
set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# ╭──────────────────────────────────────────────────────────╮
# │                       Keybindings                        │
# ╰──────────────────────────────────────────────────────────╯

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind o show-options -g

# Visual mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-end-of-line

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Smart split (vertical or horizontal based on pane size)
bind i run-shell " \
if [ $(( \$(tmux display -p '8*#{pane_width}-20*#{pane_height}') )) -lt 0 ]; then \
  tmux splitw -v -c '#{pane_current_path}'; \
else \
  tmux splitw -h -c '#{pane_current_path}'; \
fi"

# Open new window in home directory
bind c new-window -c ~

# Clear scrollback buffer
bind K send-keys "clear"\; send-keys "Enter"\; clear-history

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# Session/window chooser
bind s choose-tree -swZ
bind w choose-tree -wZ

# Switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Cycle layouts
bind -n M-O next-layout

# Resize panes
bind -n S-Up    resize-pane -U 5
bind -n S-Down  resize-pane -D 5
bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5

# Move windows
bind -n M-S-Left  swap-window -t -1\; select-window -t -1
bind -n M-S-Right swap-window -t +1\; select-window -t +1

# Go to last prompt
bind b copy-mode\;\
       send-keys -X start-of-line\;\
       send-keys -X search-backward "❯"

bind F copy-mode\;\
       send-keys -X start-of-line\;\
       send-keys -X search-backward "FCN="

# lazygit popup
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Run Claude Code in a separate session
bind -r y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'
